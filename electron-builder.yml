appId: com.sansenjian.luomusic
productName: LUO Music
directories:
  output: release_v2
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - dist-server/**/*
  - node_modules/**/*
extraResources:
  - from: build
    to: build
    filter:
      - '**/*'
npmRebuild: false
asar: true
asarUnpack:
  - "**/*.node"
  - dist-server/**/*
  - node_modules/electron-log/**/*
  - node_modules/@sansenjian/**/*
  - node_modules/@neteasecloudmusicapienhanced/**/*
  - node_modules/async-kit/**/*
  - node_modules/asynckit/**/*
  - node_modules/form-data/**/*
compression: maximum
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  requestedExecutionLevel: asInvoker
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  shortcutName: LUO Music
publish: null

codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 70%
        threshold: 5%
    patch:
      default:
        target: 70%
        threshold: 5%

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "node_modules/"
  - "tests/"
  - "**/*.config.js"
  - "**/dist/**"
  - "**/build/**"
  - "electron/"
  - "scripts/"
  - "**/*.d.ts"
  - "src/main.js"
  - "src/App.vue"

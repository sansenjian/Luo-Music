coverage:
  status:
    project:
      default:
        target: 85%
    patch:
      default:
        target: 85%
comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: false
  show_carryforward_flags: true
ignore:
  - "node_modules/**"
  - "build/**"
  - "dist/**"
  - "out/**"
  - "electron/**"
  - "scripts/**"
  - "server/**"
  - "tests/**"

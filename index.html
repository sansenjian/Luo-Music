<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LUO // MUSIC PLAYER</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
      :root {
        --app-bg: #f5f5f5;
        --app-border: #1a1a1a;
        --panel-bg: #ffffff;
        --muted: #8a8a8a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background: var(--app-bg);
      }

      #app {
        min-height: 100vh;
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 350px 1fr;
        background: var(--app-bg);
      }

      .boot-left {
        background: var(--panel-bg);
        border-right: 3px solid var(--app-border);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .boot-right {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .boot-line,
      .boot-block {
        border: 2px solid var(--app-border);
        background: repeating-linear-gradient(
          -45deg,
          #f0f0f0,
          #f0f0f0 8px,
          #ebebeb 8px,
          #ebebeb 16px
        );
      }

      .boot-line {
        height: 22px;
      }

      .boot-line.short {
        width: 50%;
      }

      .boot-block {
        min-height: 180px;
        flex: 1;
      }

      .boot-note {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @media (max-width: 900px) {
        .boot-shell {
          grid-template-columns: 260px 1fr;
        }
      }

      @media (max-width: 768px) {
        .boot-shell {
          grid-template-columns: 1fr;
        }

        .boot-left {
          border-right: none;
          border-bottom: 3px solid var(--app-border);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-shell">
        <section class="boot-left">
          <div class="boot-line"></div>
          <div class="boot-block"></div>
          <div class="boot-line short"></div>
          <div class="boot-line"></div>
        </section>
        <main class="boot-right">
          <div class="boot-line"></div>
          <div class="boot-block"></div>
          <div class="boot-note">Loading LUO Music...</div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
